<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ajapopaja Build - Task Pipeline Manager</title>
  </head>
  <body class="font-sans min-h-screen">
    <div id="app" class="max-w-4xl mx-auto p-8">
      <header class="mb-12 text-center relative">
        <div class="absolute left-0 top-0">
          <a href="#" class="text-app-muted hover:text-app-accent-1 transition-colors text-2xl" title="Home">🏠</a>
        </div>
        <div class="absolute right-0 top-0">
          <button data-action-click="toggle_theme" class="p-2 rounded-lg border border-app-border bg-app-surface text-app-text hover:bg-app-accent-1 transition-colors cursor-pointer" title="Toggle Theme">
            🌓
          </button>
        </div>
        <h1 class="text-5xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-app-accent-1 to-app-accent-2 mb-4">
          <a href="#">Ajapopaja Build</a>
        </h1>
        <p class="text-app-muted text-lg">The most awesome developer pipeline for coding AI ever!</p>
      </header>

      <div id="content">
        <!-- Views are rendered here -->
        <div class="flex justify-center p-12">
          <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-app-accent-1"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
